<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>fj — finding joy cli</title>
<style>
  :root {
    --bg: #0a0e0a;
    --bg-dark: #050805;
    --green: #1d9e75;
    --green-light: #5dcaa5;
    --text: #c0dd97;
    --muted: #888780;
    --red: #e24b4a;
    --orange: #ef9f27;
    --yellow: #97c459;
    --border: #1a2a1a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, "SF Mono", Menlo, Monaco, "Cascadia Mono", Consolas, monospace;
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
  }
  #app {
    max-width: 760px;
    margin: 0 auto;
    padding: 14px;
    padding-top: max(14px, env(safe-area-inset-top));
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 100vh;
  }
  .header {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--green-light);
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
  }
  .row {
    display: flex; gap: 6px;
    background: var(--bg-dark);
    border-radius: 8px;
    padding: 8px 10px;
    align-items: center;
    border: 0.5px solid var(--border);
  }
  .row label {
    color: var(--muted);
    font-size: 11px;
    flex-shrink: 0;
  }
  .row input {
    flex: 1;
    background: transparent;
    border: none; outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 2px;
    min-width: 0;
  }
  .pdf-zone {
    display: block;
    border: 1px dashed var(--green);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
  }
  .pdf-zone-label { color: var(--yellow); font-size: 13px; margin-bottom: 4px; }
  .pdf-status { color: var(--muted); font-size: 11px; }
  .pdf-input { position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none; }
  #output {
    flex: 1;
    background: var(--bg-dark);
    border-radius: 8px;
    padding: 12px;
    min-height: 260px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-wrap: break-word;
    border: 0.5px solid var(--border);
  }
  #output::-webkit-scrollbar { width: 6px; }
  #output::-webkit-scrollbar-thumb { background: var(--green); border-radius: 3px; }
  .prompt { color: var(--green-light); font-size: 13px; }
  .btn {
    background: var(--green);
    color: var(--bg-dark);
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }
  .btn:disabled { opacity: 0.5; }
  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    background: transparent;
    border: 0.5px solid var(--green);
    color: var(--yellow);
    border-radius: 999px;
    padding: 4px 10px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
  }
  .chip:active { background: rgba(29,158,117,0.25); }
  .green { color: var(--green-light); }
  .yellow { color: var(--yellow); }
  .muted { color: var(--muted); }
  .red { color: var(--red); }
  .orange { color: var(--orange); }
  .footer {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }
  .footer a { color: var(--green-light); text-decoration: none; }
  .srcbtn {
    background: transparent;
    border: 0.5px solid var(--green);
    color: var(--muted);
    border-radius: 6px;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  .srcbtn.active {
    background: var(--green);
    color: var(--bg-dark);
    font-weight: 600;
  }
  #studio-pick {
    margin-top: 8px;
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 6px;
    font-family: inherit;
    font-size: 12px;
  }
  .ico { width: 1em; height: 1em; vertical-align: -0.13em; flex-shrink: 0; }
  .nav {
    display: flex;
    gap: 6px;
    background: var(--bg-dark);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 5px;
  }
  .nav button {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: transparent;
    color: var(--muted);
    border: none;
    border-radius: 6px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  .nav button.active {
    background: var(--green);
    color: var(--bg-dark);
    font-weight: 600;
  }
  #view-cli {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 260px;
  }
  #view-chars {
    flex: 1;
    display: none;
    flex-direction: column;
    gap: 10px;
    min-height: 260px;
  }
  .chars-bar { display: flex; gap: 6px; align-items: center; }
  .chars-bar input {
    flex: 1;
    background: var(--bg-dark);
    border: 0.5px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 9px 10px;
    border-radius: 8px;
    outline: none;
    min-width: 0;
  }
  #chars-status { font-size: 11px; color: var(--muted); padding: 0 2px; }
  #chars-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
    overflow-y: auto;
    align-content: start;
    padding-bottom: 4px;
  }
  .cc {
    background: var(--bg-dark);
    border: 0.5px solid var(--border);
    border-left: 3px solid var(--acc, var(--green));
    border-radius: 10px;
    padding: 12px 13px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .cc-name {
    display: flex; align-items: center; gap: 7px;
    font-size: 15px; font-weight: 600;
    color: var(--acc, var(--green-light));
  }
  .cc-aka { font-size: 11px; color: var(--muted); font-weight: 400; }
  .cc-role {
    align-self: flex-start;
    font-size: 10px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--bg-dark);
    background: var(--acc, var(--green));
    border-radius: 999px;
    padding: 3px 9px;
  }
  .cc-who { font-size: 12px; line-height: 1.5; color: var(--text); }
  .cc-block { display: flex; flex-direction: column; gap: 3px; }
  .cc-h {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--muted);
  }
  .cc-h .ico { color: var(--acc, var(--green)); }
  .cc-block ul { margin: 0; padding-left: 16px; }
  .cc-block li { font-size: 12px; line-height: 1.5; color: var(--text); }
  .cc-line { font-size: 12px; line-height: 1.5; color: var(--text); }
  #chars-grid::-webkit-scrollbar { width: 6px; }
  #chars-grid::-webkit-scrollbar-thumb { background: var(--green); border-radius: 3px; }
  #view-chat {
    flex: 1;
    display: none;
    flex-direction: column;
    gap: 8px;
    min-height: 260px;
  }
  #chat-thread {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 4px;
    min-height: 200px;
  }
  #chat-thread::-webkit-scrollbar { width: 6px; }
  #chat-thread::-webkit-scrollbar-thumb { background: var(--green); border-radius: 3px; }
  .cb {
    max-width: 86%;
    padding: 9px 12px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .cb.user {
    align-self: flex-end;
    background: var(--green);
    color: var(--bg-dark);
    border-bottom-right-radius: 4px;
  }
  .cb.bot {
    align-self: flex-start;
    background: var(--bg-dark);
    color: var(--text);
    border: 0.5px solid var(--border);
    border-left: 3px solid var(--green-light);
    border-bottom-left-radius: 4px;
  }
  .cb.sys { align-self: center; font-size: 11px; color: var(--muted); background: transparent; }
  .chat-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chat-chip {
    background: transparent;
    border: 0.5px solid var(--border);
    color: var(--green-light);
    border-radius: 999px;
    padding: 5px 10px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
  }
  .chat-bar { display: flex; gap: 6px; align-items: center; }
  .chat-bar input {
    flex: 1;
    background: var(--bg-dark);
    border: 0.5px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 10px;
    outline: none;
    min-width: 0;
  }
  .iconbtn {
    background: transparent;
    border: 0.5px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 7px 9px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <span class="dot"></span>
    <span>fj v1.0 — finding joy cli</span>
  </div>

  <div class="row">
    <label>key:</label>
    <input id="api-key" type="password" placeholder="sk-ant-..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <button class="btn" id="save-key">save</button>
  </div>

  <div class="row" id="src-row">
    <label>source:</label>
    <button class="srcbtn" id="src-studio" type="button"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5a2 2 0 0 1 2-2h6v16H5a2 2 0 0 0-2 2zM21 5a2 2 0 0 0-2-2h-6v16h6a2 2 0 0 1 2 2z"/></svg> studio</button>
    <button class="srcbtn" id="src-pdf" type="button"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5 12.5 20a5 5 0 0 1-7-7l8.5-8.5a3.5 3.5 0 0 1 5 5L10.5 18a2 2 0 0 1-3-3l8-8"/></svg> pdf</button>
  </div>

  <div class="pdf-zone" id="studio-zone" style="display:none; cursor:pointer;">
    <div class="pdf-zone-label">vortex studio</div>
    <div id="studio-status" class="pdf-status">scanning this browser…</div>
    <select id="studio-pick" style="display:none;"></select>
  </div>

  <label class="pdf-zone" for="pdf-input" id="pdf-zone" style="display:none;">
    <div class="pdf-zone-label">tap to pick your pdf</div>
    <div id="pdf-status" class="pdf-status">no file yet</div>
    <input type="file" id="pdf-input" class="pdf-input" accept="application/pdf,.pdf" />
  </label>

  <div class="nav">
    <button id="nav-cli" class="active" type="button"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"/><path d="m7 9 3 3-3 3M13 15h4"/></svg> cli</button>
    <button id="nav-chars" type="button"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0M16 5.5a3 3 0 0 1 0 5M21 20a6 6 0 0 0-5-5.9"/></svg> characters</button>
    <button id="nav-chat" type="button"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 0 1-11.5 7.2L4 20l1-4.5A8 8 0 1 1 21 12z"/></svg> ask</button>
  </div>

  <div id="view-cli">
    <div id="output"></div>

    <div class="row">
      <span class="prompt">$</span>
      <input id="cmd" type="text" placeholder="fj help" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <button class="btn" id="run">run</button>
    </div>

    <div class="chip-row">
      <button class="chip" data-cmd="fj help">help</button>
      <button class="chip" data-cmd="fj Laleh">fj Laleh</button>
      <button class="chip" data-cmd="fj ch 1">fj ch 1</button>
      <button class="chip" data-cmd="fj mystery surname">fj mystery surname</button>
      <button class="chip" data-cmd="fj check">fj check</button>
    </div>
  </div>

  <div id="view-chars">
    <div class="chars-bar">
      <input id="chars-search" type="text" placeholder="filter characters…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <button class="btn" id="chars-build">build</button>
    </div>
    <div id="chars-status">not built yet — tap build to scan your source for every character.</div>
    <div id="chars-grid"></div>
  </div>

  <div id="view-chat">
    <div id="chat-thread"></div>
    <div class="chat-chips">
      <button class="chat-chip" type="button">Who is Farah and what is her arc?</button>
      <button class="chat-chip" type="button">Explain the surname mystery for the sequel</button>
      <button class="chat-chip" type="button">Trace the medallion across the book</button>
      <button class="chat-chip" type="button">How does the frame story (ch 1 / ch 43) work?</button>
    </div>
    <div class="chat-bar">
      <input id="chat-input" type="text" placeholder="ask about Finding Joy…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <button class="btn" id="chat-send">send</button>
      <button class="iconbtn" id="chat-reset" type="button">new</button>
    </div>
  </div>

  <div class="footer">made for bajun · key stays in this browser only</div>
</div>

<script>
(function(){
  const out = document.getElementById('output');
  const cmd = document.getElementById('cmd');
  const run = document.getElementById('run');
  const pdfInput = document.getElementById('pdf-input');
  const pdfStatus = document.getElementById('pdf-status');
  const pdfZone = document.getElementById('pdf-zone');
  const studioZone = document.getElementById('studio-zone');
  const studioStatus = document.getElementById('studio-status');
  const studioPick = document.getElementById('studio-pick');
  const srcStudio = document.getElementById('src-studio');
  const srcPdf = document.getElementById('src-pdf');
  const chips = document.querySelectorAll('.chip');
  const keyInput = document.getElementById('api-key');
  const saveKey = document.getElementById('save-key');
  const navCli = document.getElementById('nav-cli');
  const navChars = document.getElementById('nav-chars');
  const viewCli = document.getElementById('view-cli');
  const viewChars = document.getElementById('view-chars');
  const charsSearch = document.getElementById('chars-search');
  const charsBuild = document.getElementById('chars-build');
  const charsStatus = document.getElementById('chars-status');
  const charsGrid = document.getElementById('chars-grid');
  const navChat = document.getElementById('nav-chat');
  const viewChat = document.getElementById('view-chat');
  const chatThread = document.getElementById('chat-thread');
  const chatInput = document.getElementById('chat-input');
  const chatSend = document.getElementById('chat-send');
  const chatReset = document.getElementById('chat-reset');
  const chatChips = document.querySelectorAll('.chat-chip');

  let pdfData = null;
  let pdfName = null;
  let history = [];
  let histIdx = -1;
  let busy = false;
  let apiKey = '';
  let source = null;
  let studioKey = '';

  try { apiKey = localStorage.getItem('fj-key') || ''; } catch(e) {}
  if (apiKey) keyInput.value = apiKey;

  function idbOpen(){
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('fj-db', 1);
      req.onupgradeneeded = () => req.result.createObjectStore('files');
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  function idbSet(key, val){
    return idbOpen().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction('files', 'readwrite');
      tx.objectStore('files').put(val, key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    }));
  }
  function idbGet(key){
    return idbOpen().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction('files', 'readonly');
      const r = tx.objectStore('files').get(key);
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    }));
  }

  function println(text, cls){
    const span = document.createElement('span');
    if (cls) span.className = cls;
    span.textContent = text + '\n';
    out.appendChild(span);
    out.scrollTop = out.scrollHeight;
  }
  function printCmd(text){
    const div = document.createElement('div');
    div.className = 'green';
    div.style.marginTop = '8px';
    div.textContent = '$ ' + text;
    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
  }

  println('fj v1.0 — standalone.', 'green');
  println('1. paste api key + save', 'muted');
  println('2. choose a source: studio or pdf', 'muted');
  println('3. type: fj help', 'muted');

  idbGet('pdf').then(saved => {
    if (saved && saved.data){
      pdfData = saved.data;
      pdfName = saved.name;
      pdfStatus.textContent = '✓ ' + saved.name + ' (restored)';
      pdfStatus.style.color = 'var(--yellow)';
    }
  }).catch(() => {});

  const RESERVED = ['fj-key', 'fj-studio-key'];
  let studioRef = null;
  let studioCands = [];

  function stripHtml(s){
    if (s.indexOf('<') === -1) return s;
    try {
      const d = document.createElement('div');
      d.innerHTML = s;
      return d.textContent || d.innerText || '';
    } catch(e){ return s; }
  }
  function jsonProse(v, acc){
    if (v == null) return;
    if (typeof v === 'string'){ if (v.trim()) acc.push(v); return; }
    if (typeof v !== 'object') return;
    if (Array.isArray(v)){ v.forEach(x => jsonProse(x, acc)); return; }
    Object.keys(v).forEach(k => jsonProse(v[k], acc));
  }
  function extractProse(raw){
    if (typeof raw !== 'string') {
      try { raw = JSON.stringify(raw); } catch(e){ return ''; }
    }
    let s = (raw || '').trim();
    if (!s) return '';
    if (s[0] === '{' || s[0] === '['){
      try {
        const j = JSON.parse(s);
        if (typeof j === 'string') return stripHtml(j).trim();
        const acc = [];
        jsonProse(j, acc);
        if (acc.length) return stripHtml(acc.join('\n')).trim();
      } catch(e){}
    }
    return stripHtml(s).trim();
  }
  function wordCount(t){
    const m = t.trim().match(/\S+/g);
    return m ? m.length : 0;
  }

  function scanLocal(){
    const list = [];
    for (let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if (!k || RESERVED.indexOf(k) !== -1) continue;
      let raw;
      try { raw = localStorage.getItem(k); } catch(e){ continue; }
      const text = extractProse(raw);
      const w = wordCount(text);
      if (w >= 50) list.push({ ref: { t:'ls', k:k }, key:k, words:w });
    }
    return list;
  }
  async function scanIdb(){
    const found = [];
    if (!indexedDB.databases) return found;
    let dbs;
    try { dbs = await indexedDB.databases(); } catch(e){ return found; }
    for (const info of dbs){
      const name = info && info.name;
      if (!name || name === 'fj-db') continue;
      let db;
      try {
        db = await new Promise((res, rej) => {
          const r = indexedDB.open(name);
          r.onsuccess = () => res(r.result);
          r.onerror = () => rej(r.error);
          r.onblocked = () => rej(new Error('blocked'));
        });
      } catch(e){ continue; }
      const stores = Array.from(db.objectStoreNames || []);
      for (const sName of stores){
        let rows;
        try {
          rows = await new Promise((res, rej) => {
            const tx = db.transaction(sName, 'readonly');
            const rq = tx.objectStore(sName).getAll();
            rq.onsuccess = () => res(rq.result || []);
            rq.onerror = () => rej(rq.error);
          });
        } catch(e){ continue; }
        let best = '';
        rows.forEach(row => {
          const t = extractProse(row);
          if (t.length > best.length) best = t;
        });
        const w = wordCount(best);
        if (w >= 50) found.push({ ref:{ t:'idb', db:name, s:sName }, key:name + ' › ' + sName, words:w });
      }
      try { db.close(); } catch(e){}
    }
    return found;
  }
  async function readStudio(){
    if (!studioRef) return '';
    if (studioRef.t === 'ls'){
      try { return extractProse(localStorage.getItem(studioRef.k) || ''); } catch(e){ return ''; }
    }
    try {
      const db = await new Promise((res, rej) => {
        const r = indexedDB.open(studioRef.db);
        r.onsuccess = () => res(r.result);
        r.onerror = () => rej(r.error);
      });
      const rows = await new Promise((res, rej) => {
        const tx = db.transaction(studioRef.s, 'readonly');
        const rq = tx.objectStore(studioRef.s).getAll();
        rq.onsuccess = () => res(rq.result || []);
        rq.onerror = () => rej(rq.error);
      });
      try { db.close(); } catch(e){}
      let best = '';
      rows.forEach(row => {
        const t = extractProse(row);
        if (t.length > best.length) best = t;
      });
      return best;
    } catch(e){ return ''; }

  async function callApi(userCmd){
    if (!apiKey){

    const src = await resolveSource();
    if (!src.ok){
      println('error: ' + src.msg, 'red');

    busy = true;
    run.disabled = true;
    run.textContent = '...';
    println('thinking...', 'muted');

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: content
          }]
        })
      });

      if (out.lastChild && out.lastChild.textContent && out.lastChild.textContent.includes('thinking')){
        out.removeChild(out.lastChild);
      }

      if (!response.ok){
        const errText = await response.text();
        println('http ' + response.status + ': ' + errText.slice(0, 300), 'red');
        return;
      }

      const data = await response.json();
      const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
      if (!text){
        println('no response. raw: ' + JSON.stringify(data).slice(0, 200), 'red');

        const div = document.createElement('div');
        div.style.marginTop = '4px';
        div.textContent = text;
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
      }
    } catch (err) {
      if (out.lastChild && out.lastChild.textContent && out.lastChild.textContent.includes('thinking')){
        out.removeChild(out.lastChild);
      }

  function parseChars(raw){
    let s = String(raw || '').trim();
    s = s.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '').trim();
    try { const j = JSON.parse(s); if (j && Array.isArray(j.characters)) return j.characters; if (Array.isArray(j)) return j; } catch(e){}
    const arrStart = s.indexOf('[');
    if (arrStart === -1) return null;
    const objs = [];
    let depth = 0, start = -1, inStr = false, escd = false;
    for (let i = arrStart + 1; i < s.length; i++){
      const ch = s[i];
      if (inStr){
        if (escd) escd = false;
        else if (ch === '\\') escd = true;
        else if (ch === '"') inStr = false;
        continue;
      }
      if (ch === '"'){ inStr = true; continue; }
      if (ch === '{'){ if (depth === 0) start = i; depth++; }
      else if (ch === '}'){ depth--; if (depth === 0 && start !== -1){ try { objs.push(JSON.parse(s.slice(start, i + 1))); } catch(e){} start = -1; } }
      else if (ch === ']' && depth === 0){ break; }
    }
    return objs.length ? objs : null;
  }

  const CANON = `Finding Joy is the story of Laleh Yousafi, an Afghan girl born in Kabul on 6 May 1986 who refuses to let the Taliban steal her future. It is the first book in a planned series; the sequel is called Recovering Connection.

MAJOR CHARACTERS

  const CHAT_SYSTEM = 'You are the Finding Joy companion, an expert assistant dedicated solely to Bajun\'s YA novel "Finding Joy" (book 1; sequel "Recovering Connection"). ' +
    'Source of truth: the manuscript provided in the first user message (PDF or studio text). The SERIES BIBLE below is the author\'s authoritative plan; trust it for canon, structure, character intent, and sequel setup even where the current draft is incomplete or silent. If the manuscript and the bible clearly conflict, answer from the manuscript but note the discrepancy briefly. ' +
    'Rules: Chapters 16 and 35 are unused; never treat them as content. The Ch 47 Fatima epilogue only hints she plays tennis; do not state it outright unless the user explicitly asks you to analyze that hint, otherwise preserve the mystery. This is the author\'s own tool, so spoilers are fine. Be warm and concrete; cite chapters and POV when you can; quote sparingly. Do not invent; if neither the manuscript nor the bible covers something, say so plainly. Plain text, no markdown headings or asterisks, stay focused.\n\nSERIES BIBLE:\n' + CANON;

  let chatMsgs = [];
  let chatBlock = null;
  let chatBusy = false;

  function chatBubble(role, text){
    const d = document.createElement('div');
    d.className = 'cb ' + role;
    d.textContent = text;
    chatThread.appendChild(d);
    chatThread.scrollTop = chatThread.scrollHeight;
    return d;
  }
  function resetChat(note){
    chatMsgs = [];
    chatBlock = null;
    chatThread.innerHTML = '';
    chatBubble('sys', note || 'new chat — grounded in your current source + the series bible. ask anything about Finding Joy.');
  }
  async function chatSnapshot(){
    if (chatBlock) return { ok:true };
    const src = await resolveSource();
    if (!src.ok) return src;
    const blk = JSON.parse(JSON.stringify(src.blocks[0]));
    blk.cache_control = { type:'ephemeral' };
    chatBlock = blk;
    return { ok:true };
  }
  async function sendChat(text){
    text = (text || '').trim();
    if (!text || chatBusy) return;
    if (!apiKey){ chatBubble('sys', 'no api key — paste key + save above.'); return; }
    const snap = await chatSnapshot();
    if (!snap.ok){ chatBubble('sys', snap.msg); return; }
    chatMsgs.push({ role:'user', text:text });
    chatBubble('user', text);
    chatInput.value = '';
    chatBusy = true;
    chatSend.disabled = true;
    chatSend.textContent = '...';
    const pending = chatBubble('bot', 'thinking…');
    const apiMsgs = chatMsgs.map((m, i) => {
      if (i === 0) return { role:'user', content:[ chatBlock, { type:'text', text:m.text } ] };
      return { role:m.role, content:m.text };
    });
    try {
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key':apiKey,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true'
        },
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1200,
          system:[{ type:'text', text: CHAT_SYSTEM, cache_control:{ type:'ephemeral' } }],
          messages: apiMsgs
        })
      });
      if (!r.ok){
        const t = await r.text();
        pending.className = 'cb sys';
        pending.textContent = 'http ' + r.status + ': ' + t.slice(0, 200);
        chatMsgs.pop();
        return;
      }
      const data = await r.json();
      const ans = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
      if (!ans){
        pending.className = 'cb sys';
        pending.textContent = 'no response.';
        chatMsgs.pop();
        return;
      }
      pending.textContent = ans;
      chatMsgs.push({ role:'assistant', text: ans });
    } catch(e){
      pending.className = 'cb sys';
      pending.textContent = 'error: ' + (e && e.message ? e.message : e);
      chatMsgs.pop();
    } finally {
      chatBusy = false;
      chatSend.disabled = false;
      chatSend.textContent = 'send';
      chatThread.scrollTop = chatThread.scrollHeight;
    }
  }

  function showView(which){
    const map = { cli:[navCli, viewCli], chars:[navChars, viewChars], chat:[navChat, viewChat] };
    Object.keys(map).forEach(k => {
      const pair = map[k];
      const on = k === which;
      pair[0].classList.toggle('active', on);
      pair[1].style.display = on ? (k === 'cli' ? '' : 'flex') : 'none';
    });
  }
  navCli.addEventListener('click', () => showView('cli'));
  navChars.addEventListener('click', () => showView('chars'));
  navChat.addEventListener('click', () => showView('chat'));
  charsBuild.addEventListener('click', buildCharacters);
  charsSearch.addEventListener('input', renderChars);
  chatSend.addEventListener('click', () => sendChat(chatInput.value));
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter'){ e.preventDefault(); sendChat(chatInput.value); }
  });
  chatReset.addEventListener('click', () => resetChat());
  chatChips.forEach(c => c.addEventListener('click', () => sendChat(c.textContent)));
  resetChat();
  loadCharsCache();
})();
