<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>fj — finding joy cli</title>
<style>
  :root {
    --bg: #0a0e0a;
    --bg-dark: #050805;
    --green: #1d9e75;
    --green-light: #5dcaa5;
    --text: #c0dd97;
    --muted: #888780;
    --red: #e24b4a;
    --orange: #ef9f27;
    --yellow: #97c459;
    --border: #1a2a1a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, "SF Mono", Menlo, Monaco, "Cascadia Mono", Consolas, monospace;
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
  }
  #app {
    max-width: 760px;
    margin: 0 auto;
    padding: 14px;
    padding-top: max(14px, env(safe-area-inset-top));
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 100vh;
  }
  .header {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--green-light);
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
  }
  .row {
    display: flex; gap: 6px;
    background: var(--bg-dark);
    border-radius: 8px;
    padding: 8px 10px;
    align-items: center;
    border: 0.5px solid var(--border);
  }
  .row label {
    color: var(--muted);
    font-size: 11px;
    flex-shrink: 0;
  }
  .row input {
    flex: 1;
    background: transparent;
    border: none; outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 2px;
    min-width: 0;
  }
  .pdf-zone {
    display: block;
    border: 1px dashed var(--green);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
  }
  .pdf-zone-label { color: var(--yellow); font-size: 13px; margin-bottom: 4px; }
  .pdf-status { color: var(--muted); font-size: 11px; }
  .pdf-input { position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none; }
  #output {
    flex: 1;
    background: var(--bg-dark);
    border-radius: 8px;
    padding: 12px;
    min-height: 260px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-wrap: break-word;
    border: 0.5px solid var(--border);
  }
  #output::-webkit-scrollbar { width: 6px; }
  #output::-webkit-scrollbar-thumb { background: var(--green); border-radius: 3px; }
  .prompt { color: var(--green-light); font-size: 13px; }
  .btn {
    background: var(--green);
    color: var(--bg-dark);
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }
  .btn:disabled { opacity: 0.5; }
  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    background: transparent;
    border: 0.5px solid var(--green);
    color: var(--yellow);
    border-radius: 999px;
    padding: 4px 10px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
  }
  .chip:active { background: rgba(29,158,117,0.25); }
  .green { color: var(--green-light); }
  .yellow { color: var(--yellow); }
  .muted { color: var(--muted); }
  .red { color: var(--red); }
  .orange { color: var(--orange); }
  .footer {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }
  .footer a { color: var(--green-light); text-decoration: none; }
  .srcbtn {
    background: transparent;
    border: 0.5px solid var(--green);
    color: var(--muted);
    border-radius: 6px;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  .srcbtn.active {
    background: var(--green);
    color: var(--bg-dark);
    font-weight: 600;
  }
  #studio-pick {
    margin-top: 8px;
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 6px;
    font-family: inherit;
    font-size: 12px;
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <span class="dot"></span>
    <span>fj v1.0 — finding joy cli</span>
  </div>

  <div class="row">
    <label>key:</label>
    <input id="api-key" type="password" placeholder="sk-ant-..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <button class="btn" id="save-key">save</button>
  </div>

  <div class="row" id="src-row">
    <label>source:</label>
    <button class="srcbtn" id="src-studio" type="button">📓 studio</button>
    <button class="srcbtn" id="src-pdf" type="button">📎 pdf</button>
  </div>

  <div class="pdf-zone" id="studio-zone" style="display:none; cursor:pointer;">
    <div class="pdf-zone-label">📓 vortex studio</div>
    <div id="studio-status" class="pdf-status">scanning this browser…</div>
    <select id="studio-pick" style="display:none;"></select>
  </div>

  <label class="pdf-zone" for="pdf-input" id="pdf-zone" style="display:none;">
    <div class="pdf-zone-label">📎 tap to pick your pdf</div>
    <div id="pdf-status" class="pdf-status">no file yet</div>
    <input type="file" id="pdf-input" class="pdf-input" accept="application/pdf,.pdf" />
  </label>

  <div id="output"></div>

  <div class="row">
    <span class="prompt">$</span>
    <input id="cmd" type="text" placeholder="fj help" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <button class="btn" id="run">run</button>
  </div>

  <div class="chip-row">
    <button class="chip" data-cmd="fj help">help</button>
    <button class="chip" data-cmd="fj Laleh">fj Laleh</button>
    <button class="chip" data-cmd="fj ch 1">fj ch 1</button>
    <button class="chip" data-cmd="fj mystery surname">fj mystery surname</button>
    <button class="chip" data-cmd="fj check">fj check</button>
  </div>

  <div class="footer">made for bajun 🦓 · key stays in this browser only</div>
</div>

<script>
(function(){
  const out = document.getElementById('output');
  const cmd = document.getElementById('cmd');
  const run = document.getElementById('run');
  const pdfInput = document.getElementById('pdf-input');
  const pdfStatus = document.getElementById('pdf-status');
  const pdfZone = document.getElementById('pdf-zone');
  const studioZone = document.getElementById('studio-zone');
  const studioStatus = document.getElementById('studio-status');
  const studioPick = document.getElementById('studio-pick');
  const srcStudio = document.getElementById('src-studio');
  const srcPdf = document.getElementById('src-pdf');
  const chips = document.querySelectorAll('.chip');
  const keyInput = document.getElementById('api-key');
  const saveKey = document.getElementById('save-key');

  let pdfData = null;
  let pdfName = null;
  let history = [];
  let histIdx = -1;
  let busy = false;
  let apiKey = '';
  let source = null;
  let studioKey = '';

  try { apiKey = localStorage.getItem('fj-key') || ''; } catch(e) {}
  if (apiKey) keyInput.value = apiKey;

  function idbOpen(){
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('fj-db', 1);
      req.onupgradeneeded = () => req.result.createObjectStore('files');
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  function idbSet(key, val){
    return idbOpen().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction('files', 'readwrite');
      tx.objectStore('files').put(val, key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    }));
  }
  function idbGet(key){
    return idbOpen().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction('files', 'readonly');
      const r = tx.objectStore('files').get(key);
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    }));
  }

  function println(text, cls){
    const span = document.createElement('span');
    if (cls) span.className = cls;
    span.textContent = text + '\n';
    out.appendChild(span);
    out.scrollTop = out.scrollHeight;
  }
  function printCmd(text){
    const div = document.createElement('div');
    div.className = 'green';
    div.style.marginTop = '8px';
    div.textContent = '$ ' + text;
    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
  }

  println('fj v1.0 — standalone.', 'green');
  println('1. paste api key + save', 'muted');
  println('2. choose a source: studio or pdf', 'muted');
  println('3. type: fj help', 'muted');

  idbGet('pdf').then(saved => {
    if (saved && saved.data){
      pdfData = saved.data;
      pdfName = saved.name;
      pdfStatus.textContent = '✓ ' + saved.name + ' (restored)';
      pdfStatus.style.color = 'var(--yellow)';
    }
  }).catch(() => {});

  const RESERVED = ['fj-key', 'fj-studio-key'];
  let studioRef = null;
  let studioCands = [];

  function stripHtml(s){
    if (s.indexOf('<') === -1) return s;
    try {
      const d = document.createElement('div');
      d.innerHTML = s;
      return d.textContent || d.innerText || '';
    } catch(e){ return s; }
  }
  function jsonProse(v, acc){
    if (v == null) return;
    if (typeof v === 'string'){ if (v.trim()) acc.push(v); return; }
    if (typeof v !== 'object') return;
    if (Array.isArray(v)){ v.forEach(x => jsonProse(x, acc)); return; }
    Object.keys(v).forEach(k => jsonProse(v[k], acc));
  }
  function extractProse(raw){
    if (typeof raw !== 'string') {
      try { raw = JSON.stringify(raw); } catch(e){ return ''; }
    }
    let s = (raw || '').trim();
    if (!s) return '';
    if (s[0] === '{' || s[0] === '['){
      try {
        const j = JSON.parse(s);
        if (typeof j === 'string') return stripHtml(j).trim();
        const acc = [];
        jsonProse(j, acc);
        if (acc.length) return stripHtml(acc.join('\n')).trim();
      } catch(e){}
    }
    return stripHtml(s).trim();
  }
  function wordCount(t){
    const m = t.trim().match(/\S+/g);
    return m ? m.length : 0;
  }

  function scanLocal(){
    const list = [];
    for (let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if (!k || RESERVED.indexOf(k) !== -1) continue;
      let raw;
      try { raw = localStorage.getItem(k); } catch(e){ continue; }
      const text = extractProse(raw);
      const w = wordCount(text);
      if (w >= 50) list.push({ ref: { t:'ls', k:k }, key:k, words:w });
    }
    return list;
  }
  async function scanIdb(){
    const found = [];
    if (!indexedDB.databases) return found;
    let dbs;
    try { dbs = await indexedDB.databases(); } catch(e){ return found; }
    for (const info of dbs){
      const name = info && info.name;
      if (!name || name === 'fj-db') continue;
      let db;
      try {
        db = await new Promise((res, rej) => {
          const r = indexedDB.open(name);
          r.onsuccess = () => res(r.result);
          r.onerror = () => rej(r.error);
          r.onblocked = () => rej(new Error('blocked'));
        });
      } catch(e){ continue; }
      const stores = Array.from(db.objectStoreNames || []);
      for (const sName of stores){
        let rows;
        try {
          rows = await new Promise((res, rej) => {
            const tx = db.transaction(sName, 'readonly');
            const rq = tx.objectStore(sName).getAll();
            rq.onsuccess = () => res(rq.result || []);
            rq.onerror = () => rej(rq.error);
          });
        } catch(e){ continue; }
        let best = '';
        rows.forEach(row => {
          const t = extractProse(row);
          if (t.length > best.length) best = t;
        });
        const w = wordCount(best);
        if (w >= 50) found.push({ ref:{ t:'idb', db:name, s:sName }, key:name + ' › ' + sName, words:w });
      }
      try { db.close(); } catch(e){}
    }
    return found;
  }
  async function readStudio(){
    if (!studioRef) return '';
    if (studioRef.t === 'ls'){
      try { return extractProse(localStorage.getItem(studioRef.k) || ''); } catch(e){ return ''; }
    }
    try {
      const db = await new Promise((res, rej) => {
        const r = indexedDB.open(studioRef.db);
        r.onsuccess = () => res(r.result);
        r.onerror = () => rej(r.error);
      });
      const rows = await new Promise((res, rej) => {
        const tx = db.transaction(studioRef.s, 'readonly');
        const rq = tx.objectStore(studioRef.s).getAll();
        rq.onsuccess = () => res(rq.result || []);
        rq.onerror = () => rej(rq.error);
      });
      try { db.close(); } catch(e){}
      let best = '';
      rows.forEach(row => {
        const t = extractProse(row);
        if (t.length > best.length) best = t;
      });
      return best;
    } catch(e){ return ''; }
  }

  function setStudio(c){
    studioRef = c.ref;
    studioKey = c.key;
    try { localStorage.setItem('fj-studio-key', JSON.stringify({ key: c.key })); } catch(e){}
    studioStatus.textContent = '✓ ' + c.key + '  ~' + c.words + ' words (live)';
    studioStatus.style.color = 'var(--yellow)';
  }
  async function pickStudio(){
    studioStatus.textContent = 'scanning this browser…';
    studioStatus.style.color = 'var(--orange)';
    studioPick.style.display = 'none';
    let cands = scanLocal();
    try { cands = cands.concat(await scanIdb()); } catch(e){}
    cands.sort((a, b) => b.words - a.words);
    studioCands = cands;
    if (!cands.length){
      studioRef = null;
      studioStatus.textContent = 'no studio text in this browser. open vortex on this device & let it save, then tap here to rescan — or use pdf.';
      studioStatus.style.color = 'var(--red)';
      return;
    }
    let saved = null;
    try { saved = JSON.parse(localStorage.getItem('fj-studio-key') || 'null'); } catch(e){}
    let chosen = cands[0];
    if (saved && saved.key){
      const m = cands.filter(c => c.key === saved.key)[0];
      if (m) chosen = m;
    }
    setStudio(chosen);
    studioPick.innerHTML = '';
    cands.forEach((c, i) => {
      const o = document.createElement('option');
      o.value = String(i);
      o.textContent = c.key + '  (~' + c.words + ' words)';
      studioPick.appendChild(o);
    });
    studioPick.value = String(cands.indexOf(chosen));
    studioPick.style.display = cands.length > 1 ? 'block' : 'none';
  }

  function chooseSource(s){
    source = s;
    srcStudio.classList.toggle('active', s === 'studio');
    srcPdf.classList.toggle('active', s === 'pdf');
    if (s === 'pdf'){
      pdfZone.style.display = '';
      studioZone.style.display = 'none';
      println(pdfName ? ('source: pdf — using ' + pdfName + ' (tap to change)') : 'source: pdf — pick a file above.', 'yellow');
    } else {
      studioZone.style.display = '';
      pdfZone.style.display = 'none';
      println('source: studio — reading vortex live from this browser.', 'yellow');
      pickStudio();
    }
  }

  srcStudio.addEventListener('click', () => chooseSource('studio'));
  srcPdf.addEventListener('click', () => chooseSource('pdf'));
  studioPick.addEventListener('change', () => {
    const c = studioCands[Number(studioPick.value)];
    if (c) setStudio(c);
  });
  studioPick.addEventListener('click', e => e.stopPropagation());
  studioZone.addEventListener('click', e => {
    if (e.target === studioPick) return;
    pickStudio();
  });

  saveKey.addEventListener('click', () => {
    apiKey = keyInput.value.trim();
    try { localStorage.setItem('fj-key', apiKey); } catch(e){}
    println('key saved (browser only).', 'yellow');
  });

  pdfInput.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const sizeMb = (file.size / 1048576).toFixed(1);
    pdfStatus.textContent = 'loading ' + sizeMb + ' mb...';
    pdfStatus.style.color = 'var(--orange)';
    if (file.size > 30 * 1048576){
      pdfStatus.textContent = 'too big (' + sizeMb + ' mb, max ~30)';
      pdfStatus.style.color = 'var(--red)';
      println('error: pdf is ' + sizeMb + ' mb. max ~30 mb.', 'red');
      return;
    }
    try {
      const reader = new FileReader();
      reader.onload = () => {
        const result = reader.result;
        const comma = result.indexOf(',');
        pdfData = comma >= 0 ? result.slice(comma + 1) : result;
        pdfName = file.name;
        pdfStatus.textContent = '✓ ' + file.name + ' (' + sizeMb + ' mb)';
        pdfStatus.style.color = 'var(--yellow)';
        println('pdf loaded: ' + file.name, 'yellow');
        println('ready. try: fj Laleh', 'muted');
        idbSet('pdf', { data: pdfData, name: pdfName })
          .catch(() => println('warn: could not save pdf for next time', 'orange'));
      };
      reader.onerror = () => {
        pdfStatus.textContent = 'failed to read pdf';
        pdfStatus.style.color = 'var(--red)';
      };
      reader.readAsDataURL(file);
    } catch (err) {
      pdfStatus.textContent = 'error: ' + err.message;
      pdfStatus.style.color = 'var(--red)';
    }
  });

  function showHelp(){
    const lines = [
      'commands:',
      '  fj <name>           summarize a character',
      '  fj ch <n>           chapter summary (n or n-m)',
      '  fj mystery <name>   trace a mystery thread',
      '  fj timeline         events in order',
      '  fj find "<text>"    find a phrase with pages',
      '  fj check            continuity check',
      '  fj check <thing>    focused check',
      '  fj ? <question>     ask anything',
      '  fj help             show this',
      '  fj clear            wipe the chat',
      '  clear               wipe the chat',
      '',
      'source: tap studio or pdf up top (asked each refresh).',
      '  studio = live vortex text, no upload.',
      '  pdf    = your file (last one auto-loads).',
      '',
      'each answer ends with sources (chapters/pages).'
    ];
    lines.forEach(l => println(l));
  }

  function buildPrompt(userCmd){
    return 'You are "fj", a command-line trilogy bible for Bajun\'s YA novel "Finding Joy" about Laleh Yousafi, a girl who secretly learns tennis in Taliban-controlled Afghanistan, escapes, and becomes a pro player. Trilogy: 3 books (~37, 42, 43 chapters). Main characters: Laleh Yousafi, Fatima Zahra, Sinclair. Key mysteries: medallion, the name "Farah", surname mechanic (Laleh and Fatima never knew each other\'s last names as kids in Kabul).\n\nUser ran this CLI command: `' + userCmd + '`\n\nRules:\n- Terminal-style output: terse, scannable, no fluff intro.\n- Plain text only. No markdown, no asterisks. 2-space indent for sub-items.\n- Use the provided manuscript (PDF or studio text) as your only source of truth.\n- For "fj <name>": who they are, what they know, key moments, arc so far.\n- For "fj ch N": chapter summary, POV, mysteries planted, locked details.\n- For "fj mystery <X>": every breadcrumb in chronological order.\n- For "fj check": scan for contradictions; list them or say "no contradictions found".\n- For "fj find \\"X\\"": every occurrence with chapter context and approximate page.\n- For "fj ? <question>": answer directly from the manuscript.\n- For "fj timeline": chronological events.\n- If the manuscript doesn\'t cover something, say so. Don\'t invent.\n- ALWAYS end with: "sources: ch X (p.N), ch Y (p.N)".\n- Under ~250 words.';
  }

  async function callApi(userCmd){
    if (!apiKey){
      println('error: no api key. paste key + save above.', 'red');
      return;
    }
    if (!source){
      println('error: choose a source first — tap studio or pdf above.', 'red');
      return;
    }
    let content;
    if (source === 'pdf'){
      if (!pdfData){
        println('error: no pdf loaded. pick one above first.', 'red');
        return;
      }
      content = [
        { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: pdfData } },
        { type: 'text', text: buildPrompt(userCmd) }
      ];
    } else {
      const studioText = await readStudio();
      if (!studioText || wordCount(studioText) < 30){
        println('error: no studio text found. open vortex on this device & save, or switch source.', 'red');
        return;
      }
      content = [
        { type: 'text', text: 'MANUSCRIPT (from the vortex writing studio — treat this as the full source text):\n\n' + studioText },
        { type: 'text', text: buildPrompt(userCmd) }
      ];
    }
    busy = true;
    run.disabled = true;
    run.textContent = '...';
    println('thinking...', 'muted');

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: content
          }]
        })
      });

      if (out.lastChild && out.lastChild.textContent && out.lastChild.textContent.includes('thinking')){
        out.removeChild(out.lastChild);
      }

      if (!response.ok){
        const errText = await response.text();
        println('http ' + response.status + ': ' + errText.slice(0, 300), 'red');
        return;
      }

      const data = await response.json();
      const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
      if (!text){
        println('no response. raw: ' + JSON.stringify(data).slice(0, 200), 'red');
      } else {
        const div = document.createElement('div');
        div.style.marginTop = '4px';
        div.textContent = text;
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
      }
    } catch (err) {
      if (out.lastChild && out.lastChild.textContent && out.lastChild.textContent.includes('thinking')){
        out.removeChild(out.lastChild);
      }
      println('error: ' + (err.message || err), 'red');
    } finally {
      busy = false;
      run.disabled = false;
      run.textContent = 'run';
    }
  }

  async function execute(text){
    if (busy) return;
    const trimmed = text.trim();
    if (!trimmed) return;
    printCmd(trimmed);
    history.unshift(trimmed);
    histIdx = -1;

    if (trimmed === 'clear' || trimmed === 'fj clear'){ out.innerHTML = ''; return; }
    if (trimmed === 'fj help' || trimmed === 'help'){ showHelp(); return; }
    if (!trimmed.startsWith('fj')){
      println('unknown. type "fj help"', 'orange');
      return;
    }
    await callApi(trimmed);
  }

  run.addEventListener('click', () => {
    const t = cmd.value;
    cmd.value = '';
    execute(t);
  });
  cmd.addEventListener('keydown', (e) => {
    if (e.key === 'Enter'){
      e.preventDefault();
      const t = cmd.value;
      cmd.value = '';
      execute(t);
    } else if (e.key === 'ArrowUp'){
      e.preventDefault();
      if (history.length && histIdx < history.length - 1){
        histIdx++;
        cmd.value = history[histIdx];
      }
    } else if (e.key === 'ArrowDown'){
      e.preventDefault();
      if (histIdx > 0){ histIdx--; cmd.value = history[histIdx]; }
      else { histIdx = -1; cmd.value = ''; }
    }
  });
  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      cmd.value = chip.dataset.cmd;
      cmd.focus();
    });
  });
})();
</script>
</body>
</html>
